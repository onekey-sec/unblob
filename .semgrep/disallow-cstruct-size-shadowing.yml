rules:
  - id: no-cstruct-size-shadowing
    message: Avoid naming StructParser C definition fields `size`; it shadows dissect.cstruct's generated `.size` attribute.
    languages: [regex]
    severity: ERROR
    paths:
      include:
        - python/unblob/handlers/**/*.py
    pattern-regex: >-
      (?s)C_DEFINITIONS\s*=\s*r?(""".*?\b(?:u?int(?:8|16|32|64)|char|ulong|ushort|short)\s+size(?:\s*\[[^\]]+\])?\s*;.*?"""|'''.*?\b(?:u?int(?:8|16|32|64)|char|ulong|ushort|short)\s+size(?:\s*\[[^\]]+\])?\s*;.*?''')
